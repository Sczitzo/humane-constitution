<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#272d2a" />
    <meta name="description" content="Public working draft and reader prototype for the Humane Constitution. Not active governance; pilot evidence remains required." />

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Inter (UI sans-serif) + JetBrains Mono (monospace data display) + Cormorant Garamond (landing display) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <title>Humane Constitution — Public Draft Reader</title>

    <!-- Apply saved theme before React mounts to avoid flash-of-wrong-theme -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('humane-reader:theme')
          var resolved =
            stored === 'dark' ? 'dark' :
            stored === 'light' ? 'light' :
            window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          if (resolved === 'dark') document.documentElement.setAttribute('data-theme', 'dark')
        } catch (_) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
