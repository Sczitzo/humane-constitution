<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Outer hexagon ring — plasma violet -->
  <polygon
    points="16,2 28,9 28,23 16,30 4,23 4,9"
    stroke="#a855f7"
    stroke-width="1.5"
    fill="none"
    opacity="0.9"
  />
  <!-- Inner hexagon — hot magenta -->
  <polygon
    points="16,7 23,11.5 23,20.5 16,25 9,20.5 9,11.5"
    stroke="#c026d3"
    stroke-width="1"
    fill="rgba(124,58,237,0.15)"
    opacity="0.8"
  />
  <!-- Centre dot — neon cyan -->
  <circle cx="16" cy="16" r="2.5" fill="#22d3ee" opacity="0.95"/>
  <!-- Tick marks at each pillar vertex -->
  <circle cx="16" cy="4"  r="1" fill="#a855f7" opacity="0.7"/>
  <circle cx="27" cy="10" r="1" fill="#a855f7" opacity="0.7"/>
  <circle cx="27" cy="22" r="1" fill="#a855f7" opacity="0.7"/>
  <circle cx="16" cy="28" r="1" fill="#a855f7" opacity="0.7"/>
  <circle cx="5"  cy="22" r="1" fill="#a855f7" opacity="0.7"/>
  <circle cx="5"  cy="10" r="1" fill="#a855f7" opacity="0.7"/>
</svg>
